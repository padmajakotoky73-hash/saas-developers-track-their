Here's the complete GitHub Actions pipeline:

```yaml
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
        node-version: ['20']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run FastAPI tests
      working-directory: ./backend
      run: |
        pytest --cov=./ --cov-report=xml

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4

  security:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Trivy container scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'backend/Dockerfile'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'

    - name: Snyk security scan
      uses: snyk/actions/node@master
      with:
        command: monitor
        args: --all-projects --detection-depth=6

    - name: OWASP ZAP baseline scan
      uses: zaproxy/action-baseline@v0.11.0
      with:
        target: 'http://localhost:8000'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-config api.disablekey=true'

  migrations:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        pip install -r requirements-dev.txt

    - name: Run Alembic migrations
      working-directory: ./backend
      run: |
        alembic upgrade head
        alembic check

  docs:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Generate OpenAPI docs
      working-directory: ./backend
      run: |
        pip install -r requirements-dev.txt
        python -c "from app.main import app; import json; open('openapi.json', 'w').write(json.dumps(app.openapi()))"

    - name: Commit docs
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add backend/openapi.json
        git commit -m "Update OpenAPI docs" || echo "No changes to commit"
        git push || echo "Nothing to push"

  deploy:
    needs: [test, security, migrations, docs]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy backend to Railway
      uses: railwayapp/action@v1
      with:
        service: backend
        token: ${{ secrets.RAILWAY_TOKEN }}
        environment: production

    - name: Deploy frontend to Vercel
      uses: amondnet/vercel-action@v30
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
        vercel-args: '--prod'
```